name: Pull Request Validation

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate Static Resume Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Required Pages
        run: |
          test -f index.html
          test -f experience.html
          test -f projects.html
          test -f certifications.html
          test -f 404.html

      - name: Validate Required Assets
        run: |
          test -f css/style.css
          test -f js/main.js
          test -f assets/Kelvin-Fon-Resume.docx

      - name: Validate Files Are Not Empty
        run: |
          test -s index.html
          test -s experience.html
          test -s projects.html
          test -s certifications.html
          test -s 404.html
          test -s css/style.css
          test -s js/main.js

      - name: Validation Passed
        run: echo "Resume portfolio validation completed successfully."